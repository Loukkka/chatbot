<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chatbot IA - Google Gemini</title>

<style>
/* ============================================================
   BASE
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; }

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f4f6fb;
    margin: 0;
}

/* ============================================================
   FLOATING BUTTON
   ============================================================ */
#chat-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 62px;
    height: 62px;
    border-radius: 50%;
    background: #4B6BFB;
    color: #fff;
    border: none;
    font-size: 26px;
    cursor: pointer;
    box-shadow: 0 4px 18px rgba(75,107,251,0.35);
    z-index: 9999;
    transition: transform 0.2s, opacity 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
}
#chat-btn:hover { transform: scale(1.08); }
#chat-btn:focus-visible {
    outline: 3px solid #4B6BFB;
    outline-offset: 3px;
}
#chat-btn.hidden {
    opacity: 0;
    pointer-events: none;
    transform: scale(0.8);
}

/* ============================================================
   CHAT CONTAINER — responsive
   ============================================================ */
#chat-container {
    width: min(380px, calc(100vw - 24px));
    height: min(520px, calc(100dvh - 100px));
    position: fixed;
    bottom: 92px;
    right: 12px;
    background: #fff;
    border-radius: 18px;
    box-shadow: 0 12px 48px rgba(0,0,0,0.18);
    display: none;
    flex-direction: column;
    overflow: hidden;
    z-index: 9998;
    animation: slideUp 0.3s ease;
}
#chat-container.open { display: flex; }

@keyframes slideUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
}

@media (max-width: 420px) {
    #chat-container {
        width: calc(100vw - 12px);
        height: calc(100dvh - 90px);
        right: 6px;
        bottom: 80px;
        border-radius: 14px;
    }
    #chat-btn {
        bottom: 14px;
        right: 14px;
        width: 56px;
        height: 56px;
        font-size: 22px;
    }
}
@media (max-width: 360px) {
    #chat-container { width: calc(100vw - 8px); right: 4px; left: 4px; }
}

/* ============================================================
   HEADER — contrast AAA on primary
   ============================================================ */
#chat-header {
    background: #4B6BFB;
    color: #fff;
    padding: 16px 18px;
    font-weight: 600;
    font-size: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

#chat-header button {
    background: rgba(255,255,255,0.18);
    border: none;
    color: #fff;
    padding: 6px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    transition: background 0.2s;
}
#chat-header button:hover { background: rgba(255,255,255,0.32); }
#chat-header button:focus-visible {
    outline: 2px solid #fff;
    outline-offset: 2px;
}
#chat-header div {
    display: flex;
    align-items: center;
}

/* ============================================================
   NETWORK BANNER
   ============================================================ */
#net-banner {
    background: #fee2e2;
    color: #991b1b;
    text-align: center;
    font-size: 12px;
    padding: 6px;
    font-weight: 500;
    display: none;
}
#net-banner.show { display: block; }

/* ============================================================
   MESSAGES
   ============================================================ */
#chat-messages {
    flex: 1;
    padding: 14px;
    overflow-y: auto;
    font-size: 14px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    background: #fafbff;
    scroll-behavior: smooth;
}

.message {
    padding: 10px 14px;
    border-radius: 16px;
    max-width: 84%;
    line-height: 1.5;
    word-wrap: break-word;
    white-space: pre-wrap;
}

.bot {
    background: #e1e5ff;
    color: #1e2a5a;                /* contrast ratio ~9:1 */
    align-self: flex-start;
    border-bottom-left-radius: 4px;
}

.user {
    background: #4B6BFB;
    color: #fff;
    align-self: flex-end;
    border-bottom-right-radius: 4px;
}

.system {
    background: #fff3cd;
    color: #664d03;               /* contrast ratio ~7:1 */
    align-self: center;
    text-align: center;
    font-size: 13px;
    border-radius: 10px;
    max-width: 95%;
}

/* Typing indicator — animated dots */
.typing-dots {
    background: #e1e5ff;
    align-self: flex-start;
    border-bottom-left-radius: 4px;
    padding: 12px 18px;
    display: flex;
    gap: 5px;
}
.typing-dots span {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #7b8cc5;
    animation: dot-bounce 0.6s infinite alternate;
}
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes dot-bounce {
    0%   { opacity: 0.3; transform: translateY(0); }
    100% { opacity: 1;   transform: translateY(-4px); }
}

/* ============================================================
   INPUT BAR
   ============================================================ */
#chat-input {
    display: flex;
    align-items: center;
    padding: 10px 12px;
    background: #fff;
    border-top: 1px solid #eee;
    gap: 8px;
}

#chat-input input {
    flex: 1;
    padding: 11px 16px;
    border: 1.5px solid #e0e4ea;
    border-radius: 24px;
    outline: none;
    font-size: 14px;
    font-family: inherit;
    background: #f7f8fb;
    transition: border 0.2s, background 0.2s;
}
#chat-input input:focus {
    border-color: #4B6BFB;
    background: #fff;
}

#chat-input button {
    width: 42px; height: 42px;
    border-radius: 50%;
    background: #4B6BFB;
    color: #fff;
    border: none;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, transform 0.15s;
    flex-shrink: 0;
}
#chat-input button:hover {
    background: #3a56d4;
    transform: scale(1.06);
}
#chat-input button:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none;
}
#chat-input button:focus-visible {
    outline: 3px solid #4B6BFB;
    outline-offset: 2px;
}

/* ============================================================
   API KEY MODAL
   ============================================================ */
#api-modal {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5);
    z-index: 10000;
    justify-content: center;
    align-items: center;
}
#api-modal.show { display: flex; }

#api-modal-content {
    background: #fff;
    padding: 25px;
    border-radius: 16px;
    width: min(360px, calc(100vw - 32px));
    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
}
#api-modal-content h3 { margin-top: 0; color: #1e2a5a; }
#api-modal-content input {
    width: 100%;
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 8px;
    margin: 10px 0;
    font-size: 14px;
    box-sizing: border-box;
}
#api-modal-content .btn-row {
    display: flex;
    gap: 10px;
    margin-top: 10px;
}
#api-modal-content button {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
}
#api-modal-content .btn-save  { background: #4B6BFB; color: #fff; }
#api-modal-content .btn-cancel { background: #eee; color: #333; }
#api-modal-content p { font-size: 13px; color: #555; margin-bottom: 5px; }
#api-modal-content a { color: #4B6BFB; }

/* ============================================================
   SKIP LINK (accessibility)
   ============================================================ */
.sr-only {
    position: absolute;
    width: 1px; height: 1px;
    padding: 0; margin: -1px;
    overflow: hidden;
    clip: rect(0,0,0,0);
    border: 0;
}
</style>
</head>

<body>

<!-- Skip link for keyboard / screen reader users -->
<a href="#userInput" class="sr-only">Aller au champ de saisie du chat</a>

<!-- Bouton flottant pour ouvrir le chat -->
<button id="chat-btn" aria-label="Ouvrir l'assistant" title="Ouvrir l'assistant">💬</button>

<!-- Modal pour la clé API -->
<div id="api-modal" role="dialog" aria-modal="true" aria-labelledby="api-modal-title">
    <div id="api-modal-content">
        <h3 id="api-modal-title">🔑 Clé API Google Gemini</h3>
        <p>Entrez votre clé API pour activer l'IA. Vous pouvez en obtenir une gratuitement sur
           <a href="https://aistudio.google.com/apikey" target="_blank" rel="noopener noreferrer">Google AI Studio</a>.</p>
        <input type="password" id="apiKeyInput" placeholder="Coller votre clé API ici..." aria-label="Clé API Gemini">
        <div class="btn-row">
            <button class="btn-cancel" id="modalCancelBtn">Annuler</button>
            <button class="btn-save" id="modalSaveBtn">Enregistrer</button>
        </div>
    </div>
</div>

<div id="chat-container" role="dialog" aria-label="Chat avec l'assistant IA" aria-hidden="true">
    <div id="chat-header">
        <span id="chat-title" role="heading" aria-level="1">🤖 Assistant IA</span>
        <div>
            <button id="apiSettingsBtn" aria-label="Configurer la clé API">⚙️ API</button>
            <button id="closeBtn" aria-label="Fermer le chat" style="margin-left:6px">✕</button>
        </div>
    </div>

    <div id="net-banner" role="alert" aria-live="assertive">Connexion perdue… Vérifiez votre réseau.</div>

    <div id="chat-messages" role="log" aria-live="polite" aria-label="Messages du chat"></div>

    <div id="chat-input" role="form" aria-label="Envoyer un message">
        <input type="text" id="userInput" placeholder="Posez votre question..." autocomplete="off"
               aria-label="Votre message" maxlength="500">
        <button id="sendBtn" aria-label="Envoyer le message">➤</button>
    </div>
</div>

<script>
(function () {
    "use strict";

    // ============================================================
    // MODULE: Helpers
    // ============================================================
    var $ = function (id) { return document.getElementById(id); };

    /** Sanitize user text — strip tags & control chars */
    function sanitize(str, maxLen) {
        if (typeof str !== "string") return "";
        return str
            .replace(/[<>]/g, "")
            .replace(/[\x00-\x08\x0B\x0C\x0E-\x1F]/g, "")
            .trim()
            .slice(0, maxLen || 500);
    }

    // ============================================================
    // MODULE: Config & Constants
    // ============================================================
    var MAX_DISPLAYED = 80;   // prune old DOM nodes beyond this
    var MAX_HISTORY   = 20;   // max conversation messages sent to API
    var SPAM_COOLDOWN = 1500; // ms between sends

    // ============================================================
    // MODULE: DOM Refs
    // ============================================================
    var messagesEl = $("chat-messages");
    var sendBtn    = $("sendBtn");
    var userInput  = $("userInput");
    var netBanner  = $("net-banner");
    var apiModal   = $("api-modal");
    var apiKeyIn   = $("apiKeyInput");
    var chatBox    = $("chat-container");
    var chatBtn    = $("chat-btn");
    var closeBtn   = $("closeBtn");

    // ============================================================
    // MODULE: State
    // ============================================================
    var conversationHistory = [];
    var displayedCount = 0;
    var chatOpen   = false;
    var isSending  = false;
    var lastSendTs = 0;

    // ============================================================
    // MODULE: API Key
    // ============================================================
    function getApiKey() {
        return sessionStorage.getItem("gemini_api_key") || "";
    }

    function openModal() {
        apiModal.classList.add("show");
        apiKeyIn.value = getApiKey();
        apiKeyIn.focus();
    }

    function closeModal() {
        apiModal.classList.remove("show");
    }

    function saveApiKey() {
        var key = apiKeyIn.value.trim();
        if (!key) { apiKeyIn.setAttribute("aria-invalid", "true"); return; }
        sessionStorage.setItem("gemini_api_key", key);
        closeModal();
        addMessage("✅ Clé API enregistrée ! Je suis prêt à répondre à vos questions.", "bot");
    }

    $("modalCancelBtn").addEventListener("click", closeModal);
    $("modalSaveBtn").addEventListener("click", saveApiKey);
    $("apiSettingsBtn").addEventListener("click", openModal);

    // Close modal with Escape
    document.addEventListener("keydown", function (e) {
        if (e.key === "Escape" && apiModal.classList.contains("show")) closeModal();
        else if (e.key === "Escape" && chatOpen) toggleChat();
    });

    // ============================================================
    // MODULE: Toggle Chat
    // ============================================================
    function toggleChat() {
        chatOpen = !chatOpen;
        chatBox.classList.toggle("open", chatOpen);
        chatBox.setAttribute("aria-hidden", chatOpen ? "false" : "true");
        chatBtn.classList.toggle("hidden", chatOpen);
        if (chatOpen) userInput.focus();
    }

    chatBtn.addEventListener("click", toggleChat);
    closeBtn.addEventListener("click", toggleChat);

    // ============================================================
    // MODULE: Anti-Spam
    // ============================================================
    function isSpam() {
        var now = Date.now();
        if (now - lastSendTs < SPAM_COOLDOWN) return true;
        lastSendTs = now;
        return false;
    }

    // ============================================================
    // MODULE: Network Detection
    // ============================================================
    function updateNetwork() {
        var offline = !navigator.onLine;
        netBanner.classList.toggle("show", offline);
        if (offline) { sendBtn.disabled = true; userInput.disabled = true; }
        else if (!isSending) { sendBtn.disabled = false; userInput.disabled = false; }
    }
    window.addEventListener("online", updateNetwork);
    window.addEventListener("offline", updateNetwork);

    // ============================================================
    // MODULE: Messages (with DOM pruning)
    // ============================================================
    function scrollDown() {
        requestAnimationFrame(function () {
            messagesEl.scrollTop = messagesEl.scrollHeight;
        });
    }

    function addMessage(text, type) {
        // type: "bot" | "user" | "system"
        var msg = document.createElement("div");
        msg.classList.add("message", type);
        msg.textContent = text;

        // ARIA labels
        if (type === "bot")    msg.setAttribute("aria-label", "Assistant dit");
        if (type === "user")   msg.setAttribute("aria-label", "Vous dites");
        if (type === "system") msg.setAttribute("role", "status");

        messagesEl.appendChild(msg);
        displayedCount++;

        // DOM pruning — remove oldest messages beyond limit
        while (displayedCount > MAX_DISPLAYED && messagesEl.firstChild) {
            messagesEl.removeChild(messagesEl.firstChild);
            displayedCount--;
        }

        scrollDown();
        return msg;
    }

    // ============================================================
    // MODULE: Typing Indicator (animated dots)
    // ============================================================
    function showTyping() {
        var el = document.createElement("div");
        el.classList.add("typing-dots");
        el.id = "typing-indicator";
        el.setAttribute("aria-label", "L'assistant réfléchit");
        el.innerHTML = "<span></span><span></span><span></span>";
        messagesEl.appendChild(el);
        scrollDown();
    }

    function removeTyping() {
        var el = $("typing-indicator");
        if (el) el.remove();
    }

    // ============================================================
    // MODULE: AI API (Google Gemini)
    // ============================================================
    async function askGemini(userText) {
        var apiKey = getApiKey();
        if (!apiKey) {
            openModal();
            return "⚠️ Veuillez d'abord configurer votre clé API en cliquant sur ⚙️ API.";
        }

        // Sanitize & push to history
        var cleanText = sanitize(userText, 500);
        conversationHistory.push({ role: "user", parts: [{ text: cleanText }] });

        var url = "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=" + encodeURIComponent(apiKey);

        var body = {
            contents: conversationHistory,
            systemInstruction: {
                parts: [{
                    text: "Tu es un assistant virtuel utile et sympathique. Tu réponds en français de manière claire et concise. Tu es poli et professionnel."
                }]
            },
            generationConfig: { temperature: 0.7, maxOutputTokens: 1024 }
        };

        try {
            var ctrl = new AbortController();
            var timeout = setTimeout(function () { ctrl.abort(); }, 15000);

            var response = await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(body),
                signal: ctrl.signal
            });

            clearTimeout(timeout);

            if (!response.ok) {
                var err = await response.json().catch(function () { return {}; });
                if (response.status === 400 || response.status === 403) {
                    return "❌ Clé API invalide ou quota dépassé. Vérifiez votre clé dans ⚙️ API.";
                }
                if (response.status === 429) {
                    return "⏳ Trop de requêtes. Patientez un instant avant de réessayer.";
                }
                return "❌ Erreur API (" + response.status + "): " + (err.error?.message || "Erreur inconnue");
            }

            var data = await response.json();
            var reply = data.candidates?.[0]?.content?.parts?.[0]?.text
                || "Je n'ai pas pu générer de réponse.";

            conversationHistory.push({ role: "model", parts: [{ text: reply }] });

            // Trim conversation history
            if (conversationHistory.length > MAX_HISTORY) {
                conversationHistory = conversationHistory.slice(-MAX_HISTORY);
            }

            return reply;

        } catch (error) {
            if (error.name === "AbortError") {
                return "⏳ Le serveur met trop de temps à répondre. Réessayez dans un instant.";
            }
            return "❌ Erreur de connexion. Vérifiez votre connexion internet.";
        }
    }

    // ============================================================
    // MODULE: Send
    // ============================================================
    async function sendMessage() {
        var text = userInput.value.trim();
        if (!text || isSending) return;

        if (isSpam()) {
            addMessage("Merci de patienter avant d'envoyer un autre message.", "system");
            return;
        }

        isSending = true;
        addMessage(text, "user");
        userInput.value = "";
        sendBtn.disabled = true;
        userInput.disabled = true;
        showTyping();

        var reply = await askGemini(text);

        removeTyping();
        addMessage(reply, "bot");

        sendBtn.disabled = false;
        userInput.disabled = false;
        isSending = false;
        userInput.focus();
        updateNetwork();
    }

    // ============================================================
    // MODULE: Events
    // ============================================================
    sendBtn.addEventListener("click", sendMessage);
    userInput.addEventListener("keydown", function (e) {
        if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    // ============================================================
    // MODULE: Init
    // ============================================================
    addMessage("Bonjour 👋 Je suis votre assistant IA propulsé par Google Gemini.", "bot");
    updateNetwork();

    if (!getApiKey()) {
        setTimeout(function () {
            addMessage("⚙️ Pour commencer, cliquez sur le bouton API en haut à droite pour configurer votre clé.", "bot");
        }, 800);
    }
})();
</script>

</body>
</html>
